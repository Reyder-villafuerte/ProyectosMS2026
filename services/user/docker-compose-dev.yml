name: user-dev

version: "3.9"

services:
  mysql-user-dev:
    image: mysql:8.4
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: db_user
    ports:
      - "3395:3306" # host → MySQL dev de user
    volumes:
      - mysql_user_dev_data:/var/lib/mysql

volumes:
  mysql_user_dev_data:

